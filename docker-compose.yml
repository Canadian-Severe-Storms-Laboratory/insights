services:
    postgres:
        image: postgres:16
        container_name: insights-db
        environment:
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
            - POSTGRES_HOST_AUTH_METHOD=trust
        ports:
            - "5432:5432"
        volumes:
            - ./current_pgdata/postgres-data:/var/lib/postgresql/data
    redis:
        image: redis:latest
        container_name: insights-queue
        ports:
            - "6379:6379"
volumes:
    pgdata: {}
